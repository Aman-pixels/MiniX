<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Primary Meta Tags (defaults — overridden per-page by useSEO hook) -->
  <title>MiniX – Premium Fashion & Streetwear</title>
  <meta name="title" content="MiniX – Premium Fashion & Streetwear" />
  <meta name="description" content="Discover MiniX's exclusive streetwear collections. Shop men's and women's premium clothing, accessories, and limited drops. Fast shipping & secure checkout." />
  <meta name="keywords" content="streetwear, fashion, premium clothing, accessories, online shopping, MiniX, men fashion, women fashion" />
  <meta name="author" content="MiniX" />
  <meta name="robots" content="index, follow" />
  <link rel="canonical" href="https://minix.vercel.app/" />

  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="MiniX" />
  <meta property="og:url" content="https://minix.vercel.app/" />
  <meta property="og:title" content="MiniX – Premium Fashion & Streetwear" />
  <meta property="og:description" content="Discover MiniX's exclusive streetwear collections. Shop premium clothing, accessories, and limited drops." />
  <meta property="og:image" content="https://minix.vercel.app/og-image.jpg" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />

  <!-- Twitter -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:site" content="@minixfashion" />
  <meta name="twitter:url" content="https://minix.vercel.app/" />
  <meta name="twitter:title" content="MiniX – Premium Fashion & Streetwear" />
  <meta name="twitter:description" content="Discover MiniX's exclusive streetwear collections. Shop premium clothing, accessories, and limited drops." />
  <meta name="twitter:image" content="https://minix.vercel.app/og-image.jpg" />

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="apple-touch-icon" href="/favicon.svg" />
  <link rel="manifest" href="/site.webmanifest" />

  <!-- Theme / Browser -->
  <meta name="theme-color" content="#000000" />
  <meta name="msapplication-TileColor" content="#000000" />
  <meta name="color-scheme" content="dark" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet" />

  <!-- JSON-LD: Organization + WebSite Structured Data -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@graph": [
      {
        "@type": "Organization",
        "@id": "https://minix.vercel.app/#organization",
        "name": "MiniX",
        "url": "https://minix.vercel.app/",
        "logo": {
          "@type": "ImageObject",
          "url": "https://minix.vercel.app/favicon.svg"
        },
        "description": "MiniX is a premium streetwear and fashion brand offering exclusive clothing and accessories.",
        "sameAs": []
      },
      {
        "@type": "WebSite",
        "@id": "https://minix.vercel.app/#website",
        "url": "https://minix.vercel.app/",
        "name": "MiniX",
        "publisher": {
          "@id": "https://minix.vercel.app/#organization"
        },
        "potentialAction": {
          "@type": "SearchAction",
          "target": {
            "@type": "EntryPoint",
            "urlTemplate": "https://minix.vercel.app/shop?search={search_term_string}"
          },
          "query-input": "required name=search_term_string"
        }
      }
    ]
  }
  </script>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
